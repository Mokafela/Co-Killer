name: Update Subscription

on:
  push:
    branches: [ "master" ]
  schedule:
    - cron: "*/15 * * * *" # Every 15 mins
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install xray-knife
        run: |
          wget https://github.com/lilendian0x00/xray-knife/releases/latest/download/Xray-knife-linux-64.zip -O knife.zip
          unzip knife.zip
          find . -type f -name "*knife*" ! -name "*.zip" -exec chmod +x {} \;
          find . -type f -name "*knife*" ! -name "*.zip" -exec sudo mv {} /usr/local/bin/xray-knife \;



      - name: Run Collector and Tester
        env:
          CHANNEL_URL: ${{ secrets.CHANNEL_URL }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt
          git commit -m "Auto-update subscription [skip ci]" || echo "No changes to commit"
          git push
