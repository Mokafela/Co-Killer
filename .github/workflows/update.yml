name: Update Subscription

on:
  push:
    branches: [ "master" ]
  schedule:
    - cron: "*/15 * * * *" # Every 15 mins
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install xray-knife
        run: |
          wget https://github.com/lilendian0x00/xray-knife/releases/latest/download/xray-knife-linux-amd64.zip
          unzip xray-knife-linux-amd64.zip
          chmod +x xray-knife
          sudo mv xray-knife /usr/local/bin/


      - name: Run Collector and Tester
        env:
          CHANNEL_URL: ${{ secrets.CHANNEL_URL }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt
          git commit -m "Auto-update subscription [skip ci]" || echo "No changes to commit"
          git push
