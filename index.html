<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Killer - Subscriptions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent 40%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-copy {
            background: var(--accent);
            color: white;
        }

        .btn-copy:hover {
            background: var(--accent-hover);
        }

        .btn-qr {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .btn-qr:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            position: relative;
            max-width: 90%;
            width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            width: auto;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        #qr-code {
            margin: 1.5rem auto;
            background: white;
            padding: 1rem;
            border-radius: 12px;
            display: inline-block;
        }
        
        #qr-code img {
            display: block;
        }

        .modal-title {
            margin-top: 0;
            margin-bottom: 0.5rem;
        }

        .modal-url {
            color: var(--text-secondary);
            font-size: 0.875rem;
            word-break: break-all;
            margin-bottom: 1.5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Config Killer</h1>
            <p class="subtitle">Fast V2Ray / VLESS / Trojan Configs</p>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading subscriptions...</p>
        </div>

        <div id="grid" class="grid" style="display: none;">
            <!-- Cards injected via JS -->
        </div>
    </div>

    <div id="qr-modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2 id="modal-title" class="modal-title">QR Code</h2>
            <div id="modal-url" class="modal-url"></div>
            <div id="qr-code"></div>
            <button class="btn-copy" id="modal-copy-btn" style="width: 100%; margin-top: 1rem;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy Link
            </button>
        </div>
    </div>

    <script>
        async function loadSubscriptions() {
            try {
                // In a real environment, this might be hosted on GitHub Pages
                // and subs/subs.json will be available relative to index.html
                const response = await fetch('subs/subs.json');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                renderCards(data);
            } catch (error) {
                console.error('Error fetching subscriptions:', error);
                document.getElementById('loading').innerHTML = '<p>Error loading subscriptions. Please check back later.</p>';
            }
        }

        function renderCards(subs) {
            const grid = document.getElementById('grid');
            document.getElementById('loading').style.display = 'none';
            grid.style.display = 'grid';
            
            grid.innerHTML = ''; // clear
            
            subs.forEach(sub => {
                const card = document.createElement('div');
                card.className = 'card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="card-title">${sub.flag || ''} ${sub.name}</h3>
                        <span class="badge">${sub.count}</span>
                    </div>
                    <div class="card-actions">
                        <button class="btn-copy" onclick="copyToClipboard('${sub.url}', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            Copy
                        </button>
                        <button class="btn-qr" onclick="showQR('${sub.name}', '${sub.url}')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                            QR
                        </button>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function copyToClipboard(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.innerHTML;
                btnElement.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!`;
                btnElement.style.background = 'var(--success)';
                
                setTimeout(() => {
                    btnElement.innerHTML = originalText;
                    btnElement.style.background = '';
                }, 2000);
            });
        }

        function showQR(name, url) {
            const modal = document.getElementById('qr-modal');
            const title = document.getElementById('modal-title');
            const urlDisplay = document.getElementById('modal-url');
            const qrContainer = document.getElementById('qr-code');
            const copyBtn = document.getElementById('modal-copy-btn');
            
            title.textContent = name;
            urlDisplay.textContent = url;
            
            // Using goqr.me API for reliable QR generation
            const qrUrl = \`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=\${encodeURIComponent(url)}&color=0f172a&bgcolor=ffffff\`;
            qrContainer.innerHTML = \`<img src="\${qrUrl}" alt="QR Code for \${name}" width="200" height="200">\`;
            
            copyBtn.onclick = () => copyToClipboard(url, copyBtn);
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('qr-modal').classList.remove('active');
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('qr-modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadSubscriptions);
    </script>
</body>
</html>
